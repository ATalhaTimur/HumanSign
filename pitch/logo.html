<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;display:flex;align-items:center;justify-content:center;background:#7a7a7a;
    font-family:-apple-system,Inter,sans-serif}
  /* 512x512 logo — screenshot this square (Cmd+Shift+4) */
  .logo{width:512px;height:512px;border-radius:112px;
    background:radial-gradient(120% 120% at 30% 20%, #60a5fa, #2563eb 52%, #1e3a8a);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
    box-shadow:0 40px 120px rgba(37,99,235,.45), inset 0 4px 0 rgba(255,255,255,.28), inset 0 -8px 24px rgba(0,0,0,.28)}
  .logo::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 70% 90%, rgba(0,0,0,.18), transparent 60%)}
  .logo svg{position:relative;z-index:1;filter:drop-shadow(0 8px 16px rgba(0,0,0,.25))}
</style></head><body>
  <div class="logo">
    <svg width="280" height="280" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
    </svg>
  </div>
</body></html>
